name: CI/CD Pipeline

on:
  push:
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Stop old containers
        run: docker compose down

      - name: Build and start
        run: docker compose up -d --build

      - name: Wait for app
        run: sleep 10

      - name: Run tests
        run: docker exec flaskapp pytest
